name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build release APK
    runs-on: ubuntu-latest
    env:
      ANDROID_VERSION_CODE: ${{ github.run_number }}
      ANDROID_VERSION_NAME: 1.0.${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: ''

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Validate ranking contract
        run: npm run test:ranking

      - name: Build Android web assets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_OWNER_EMAIL: ${{ secrets.VITE_OWNER_EMAIL }}
        run: npm run build:android

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Prepare Android signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is missing."
            echo "Create the Android signing secrets before building the release APK."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/hibridclub-release.jks

      - name: Build release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_FILE: hibridclub-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mkdir -p android-release
          cp android/app/build/outputs/apk/release/app-release.apk "android-release/hibrid-club-${ANDROID_VERSION_NAME}-${ANDROID_VERSION_CODE}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hibrid-club-release-apk
          path: android-release/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ env.ANDROID_VERSION_NAME }}
          name: Hibrid Club Android v${{ env.ANDROID_VERSION_NAME }}
          files: android-release/*.apk
          make_latest: true

      - name: Update versioned APK link in README
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_VERSION: ${{ env.ANDROID_VERSION_NAME }}
          RELEASE_CODE: ${{ env.ANDROID_VERSION_CODE }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ['RELEASE_VERSION']
          code = os.environ['RELEASE_CODE']
          repository = os.environ['GITHUB_REPOSITORY']
          apk_url = f"https://github.com/{repository}/releases/download/android-v{version}/hibrid-club-{version}-{code}.apk"
          readme_path = Path('README.md')
          readme = readme_path.read_text(encoding='utf-8')
          pattern = r"https://github\.com/[^/]+/[^/]+/releases/download/android-v\d+\.\d+\.\d+/hibrid-club-\d+\.\d+\.\d+-\d+\.apk"
          updated, replacements = re.subn(pattern, apk_url, readme)
          if replacements == 0:
              raise SystemExit('No versioned APK link was found in README.md')
          updated = re.sub(r"Baixar o APK \d+\.\d+\.\d+", f"Baixar o APK {version}", updated)
          readme_path.write_text(updated, encoding='utf-8')
          PY

          if git diff --quiet -- README.md; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update APK link to ${ANDROID_VERSION_NAME} [skip ci]"
          git push origin HEAD:main
