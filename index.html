<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/iconpwa.png" />
    <link rel="apple-touch-icon" href="/iconpwa.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0A0D14" />
    <title>Hyperactive Fit</title>
    <script>
      (() => {
        const storageKey = 'hyperactive-theme';
        const savedTheme = window.localStorage.getItem(storageKey);
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = savedTheme ? savedTheme === 'dark' : prefersDark;
        document.documentElement.classList.toggle('dark', isDark);
        const themeColorMeta = document.querySelector('meta[name="theme-color"]');
        if (themeColorMeta) {
          themeColorMeta.setAttribute('content', isDark ? '#0A0D14' : '#F5F7FB');
        }
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-VOrFRkrb.js"></script>

  </body>
</html>
